<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的收藏</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="main-area">
    <div class="top-bar">
      <h2>❤️ My Favorites</h2>
      <div style="display:flex;gap:10px;align-items:center">
        <button id="deleteFolderBtn" onclick="showDeleteFolder()" style="display:none;width:auto;padding:8px 16px;font-size:13px;margin:0;
      background:#fef2f2;color:var(--danger);border:1.5px solid #fecaca;border-radius:20px">
          🗑️ 刪除資料夾
        </button>
        <button onclick="showCreateFolder()" style="
      width:auto;padding:8px 16px;font-size:13px;margin:0;
      background:var(--brand);color:white;border-radius:20px">
          ＋ 新增資料夾
        </button>
      </div>
    </div>

    <!-- 資料夾列表 -->
    <div id="folderSection" style="margin-bottom:24px">
      <div id="folderList" style="display:flex;gap:12px;flex-wrap:wrap"></div>
    </div>

    <!-- 收藏活動列表 -->
    <div id="favoriteList" class="event-grid"></div>
  </div>

  <!-- 新增資料夾 popup -->
  <div id="createFolderPopup" class="popup-overlay" style="display:none;align-items:center;justify-content:center">
    <div class="popup-box" style="border-radius:var(--radius-xl);max-width:400px;width:90%">
      <div class="popup-handle"></div>
      <h3>新增資料夾</h3>
      <div class="form-group" style="margin-top:16px">
        <label>資料夾名稱</label>
        <input type="text" id="folderNameInput" placeholder="輸入名稱...">
      </div>
      <div class="popup-footer">
        <button onclick="closeCreateFolder()" style="
          width:auto;padding:10px 24px;background:var(--bg);
          color:var(--text-primary);border:1.5px solid var(--border)">
          取消
        </button>
        <button onclick="submitCreateFolder()" style="width:auto;padding:10px 24px">
          建立
        </button>
      </div>
    </div>
  </div>

  <!-- 移動到資料夾 popup -->
  <div id="moveFolderPopup" class="popup-overlay" style="display:none;align-items:center;justify-content:center">
    <div class="popup-box" style="border-radius:var(--radius-xl);max-width:400px;width:90%">
      <div class="popup-handle"></div>
      <h3>加入資料夾</h3>
      <p style="color:var(--text-secondary);font-size:14px;margin-bottom:16px">選擇要加入的資料夾</p>
      <div id="folderOptions"></div>
      <div class="popup-footer">
        <button onclick="closeMoveFolder()" style="
          width:auto;padding:10px 24px;background:var(--bg);
          color:var(--text-primary);border:1.5px solid var(--border)">
          取消
        </button>
      </div>
    </div>
  </div>

  <!-- 刪除資料夾確認 popup -->
  <div id="deleteFolderPopup" class="popup-overlay" style="display:none;align-items:center;justify-content:center">
    <div class="popup-box" style="border-radius:var(--radius-xl);max-width:400px;width:90%">
      <div class="popup-handle"></div>
      <h3>刪除資料夾</h3>
      <p style="color:var(--text-secondary);font-size:14px;margin-top:8px">
        確定要刪除此資料夾嗎？<br>
        資料夾內的活動不會被刪除，會回到全部收藏。
      </p>
      <div class="popup-footer" style="margin-top:20px">
        <button onclick="closeDeleteFolder()" style="
        width:auto;padding:10px 24px;background:var(--bg);
        color:var(--text-primary);border:1.5px solid var(--border)">
          取消
        </button>
        <button onclick="confirmDeleteFolder()" style="
        width:auto;padding:10px 24px;background:var(--danger);color:white">
          確定刪除
        </button>
      </div>
    </div>
  </div>

  <script src="sidebar.js"></script>
  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = 'login.html';

    let currentFolderID = null;
    let allFolders = [];
    let moveTargetEventID = null;

    async function loadFolders() {
      const res = await fetch('/api/users/favorites/folders', {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      allFolders = await res.json();

      const folderList = document.getElementById('folderList');
      folderList.innerHTML = `
        <div onclick="selectFolder(null, this)"
          class="folder-card ${currentFolderID === null ? 'active' : ''}">
          <div class="folder-icon">📁</div>
          <p class="folder-name">全部收藏</p>
        </div>
        ${allFolders.map(f => `
  <div class="folder-card ${currentFolderID === f.folderID ? 'active' : ''}"
    onclick="selectFolder(${f.folderID}, this)">
    <div class="folder-icon">📂</div>
    <p class="folder-name">${f.folderName}</p>
  </div>
`).join('')}
       
      `;
    }

    async function loadFavorites() {
      let url = '/api/users/favorites';
      if (currentFolderID) url += `?folderID=${currentFolderID}`;

      const res = await fetch(url, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const events = await res.json();
      const list = document.getElementById('favoriteList');

      if (events.length === 0) {
        list.innerHTML = '<p class="no-events"><span class="no-events-icon">💔</span>還沒有收藏任何活動</p>';
        return;
      }

      list.innerHTML = events.map(event => `
        <div class="event-card" onclick="window.location.href='event.html?id=${event.eventID}'">
          <div class="card-top">
            <span class="status-tag open">已收藏</span>
            <div class="card-actions">
              <span onclick="event.stopPropagation(); openMoveFolder(${event.eventID})"
                title="加入資料夾"
                style="cursor:pointer;font-size:16px;padding:4px">📁</span>
              <span onclick="event.stopPropagation(); removeFavorite(${event.eventID})"
                title="取消收藏"
                style="cursor:pointer;font-size:16px;padding:4px">🗑️</span>
            </div>
          </div>
          <div class="card-body">
            <h3>${event.title}</h3>
            <p>📅 ${new Date(event.eventTime).toLocaleDateString('zh-TW')}</p>
            <p>📍 ${event.location}</p>
            ${event.folderID
          ? `<p style="color:var(--brand);font-size:12px;margin-top:6px">
                  📂 ${allFolders.find(f => f.folderID === event.folderID)?.folderName || ''}
                </p>`
          : ''
        }
          </div>
        </div>
      `).join('');
    }
    function selectFolder(folderID, el) {
      currentFolderID = folderID;
      document.querySelectorAll('.folder-card').forEach(c => c.classList.remove('active'));
      el.classList.add('active');

      // 選了特定資料夾才顯示刪除按鈕，全部收藏不顯示
      const deleteBtn = document.getElementById('deleteFolderBtn');
      deleteBtn.style.display = folderID ? 'block' : 'none';

      loadFavorites();
    }

    // 新增資料夾
    function showCreateFolder() {
      document.getElementById('createFolderPopup').style.display = 'flex';
      document.getElementById('folderNameInput').focus();
    }

    function closeCreateFolder() {
      document.getElementById('createFolderPopup').style.display = 'none';
      document.getElementById('folderNameInput').value = '';
    }

    async function submitCreateFolder() {
      const name = document.getElementById('folderNameInput').value.trim();
      if (!name) return;

      await fetch('/api/users/favorites/folders', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ folderName: name })
      });

      closeCreateFolder();
      loadFolders();
    }

    // 移動到資料夾
    function openMoveFolder(eventID) {
      moveTargetEventID = eventID;
      const options = document.getElementById('folderOptions');

      options.innerHTML = `
        <div onclick="moveToFolder(null)"
          style="padding:12px 16px;border-radius:var(--radius-sm);cursor:pointer;
          display:flex;align-items:center;gap:10px;
          background:var(--bg);margin-bottom:8px;border:1.5px solid var(--border)">
          <span>📁</span>
          <span style="font-size:14px">不分類（全部收藏）</span>
        </div>
        ${allFolders.map(f => `
          <div onclick="moveToFolder(${f.folderID})"
            style="padding:12px 16px;border-radius:var(--radius-sm);cursor:pointer;
            display:flex;align-items:center;gap:10px;
            background:var(--bg);margin-bottom:8px;border:1.5px solid var(--border)">
            <span>📂</span>
            <span style="font-size:14px">${f.folderName}</span>
          </div>
        `).join('')}
      `;

      document.getElementById('moveFolderPopup').style.display = 'flex';
    }

    function closeMoveFolder() {
      document.getElementById('moveFolderPopup').style.display = 'none';
      moveTargetEventID = null;
    }

    async function moveToFolder(folderID) {
      // 先刪除舊收藏，再重新新增到指定資料夾
      await fetch(`/api/users/favorites/${moveTargetEventID}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${token}` }
      });

      await fetch(`/api/users/favorites/${moveTargetEventID}`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ folderID })
      });

      closeMoveFolder();
      loadFavorites();
    }

    async function removeFavorite(eventID) {
      if (!confirm('確定要取消收藏嗎？')) return;
      await fetch(`/api/users/favorites/${eventID}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${token}` }
      });
      loadFavorites();
    }

    loadFolders();
    loadFavorites();
    function showDeleteFolder() {
      document.getElementById('deleteFolderPopup').style.display = 'flex';
    }

    function closeDeleteFolder() {
      document.getElementById('deleteFolderPopup').style.display = 'none';
    }

    async function confirmDeleteFolder() {
      await fetch(`/api/users/favorites/folders/${currentFolderID}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${token}` }
      });

      closeDeleteFolder();
      currentFolderID = null;
      document.getElementById('deleteFolderBtn').style.display = 'none';
      loadFolders();
      loadFavorites();
    }
  </script>
</body>

</html>
