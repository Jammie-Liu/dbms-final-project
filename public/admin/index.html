<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../styles/admin.css">
</head>

<body>
  <div class="header">
    <div class="header">
      <button class="back-btn" onclick="history.back()">← 返回</button>
      <h2>⚙️ Admin Dashboard</h2>
      <div></div>
    </div>
    <button class="logout-btn" onclick="logout()">登出</button>
  </div>

  <!-- Tab Bar -->
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setTab('pending', this)">📋 待審核</button>
    <button class="filter-btn" onclick="setTab('reported', this)">🚨 被檢舉</button>
    <button class="filter-btn" onclick="setTab('approved', this)">✅ 已通過</button>
    <button class="filter-btn" onclick="setTab('rejected', this)">❌ 退件</button>
  </div>

  <!-- 活動列表 -->
  <div class="adminEvent-container">
    <div id="adminEventList" class="admin-event-grid"></div>
  </div>

  <!-- View Detail Popup -->
  <div id="detailPopup" class="popup-overlay">
    <div class="popup-box">
      <div id="detailContent"></div>
      <div class="buttom-btns">
        <button class="btn-secondary admin-general-btn" onclick="closeDetail()">
          關閉
        </button>
        <button id="rejectBtn" class="admin-general-btn rejectBtn" onclick="auditFromDetail('rejected')">
          不通過
        </button>
        <button id="approveBtn" class="admin-general-btn approveBtn" onclick="auditFromDetail('approved')">
          通過
        </button>
      </div>
    </div>
  </div>

  <script src="../js/admin.js"></script>
</body>

</html>
