<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>瀏覽紀錄</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .main-area {
      margin-right: 0 !important;
    }
    .event-grid {
      grid-template-columns: repeat(3, 1fr) !important;
    }
  </style>
</head>
<body>
  <div class="main-area">
  <div class="top-bar">
    <h2>🕐 History</h2>
  </div>
    <div id="historyList" class="event-grid"></div>
  </div>

  <script src="sidebar.js"></script>

  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = 'login.html';

    async function loadHistory() {
      const res = await fetch('/api/users/history', {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const events = await res.json();
      const list = document.getElementById('historyList');

      if (events.length === 0) {
        list.innerHTML = '<p class="no-events">還沒有瀏覽紀錄</p>';
        return;
      }

      list.innerHTML = events.map(event => `
        <div class="event-card" onclick="goToEvent(${event.eventID})">
          <div class="card-body">
            <h3>${event.title}</h3>
            <p>📅 ${new Date(event.eventTime).toLocaleDateString('zh-TW')}</p>
            <p>📍 ${event.location}</p>
            <p style="color:#aaa;font-size:12px">
              瀏覽時間：${toTWTime(event.viewedAt)}
            </p>
          </div>
        </div>
      `).join('');
    }

    // 轉換時區
    function toTWTime(dateStr) {
      const date = new Date(dateStr);

      // 加 8 小時
      date.setHours(date.getHours() + 8);

      return date.toLocaleString('zh-TW', {
        timeZone: 'Asia/Taipei',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        hour12: false
      });
    }

    async function goToEvent(eventID) {
      try {
        await fetch(`/api/events/${eventID}/history`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}` }
        });
      } catch (err) {}
      window.location.href = `event.html?id=${eventID}`;
    }

    loadHistory();
  </script>
</body>
</html>
