<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>瀏覽紀錄</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="header">
    <button class="back-btn" onclick="history.back()">← 返回</button>
    <h2>🕐 瀏覽紀錄</h2>
    <div></div>
  </div>

  <div class="main-content" style="margin-top:70px">
    <div id="historyList" class="event-grid"><p>載入中...</p></div>
  </div>

  <div class="bottom-bar">
    <button onclick="window.location.href='index.html'">🏠 首頁</button>
    <button onclick="window.location.href='favorites.html'">❤️ 我的收藏</button>
    <button onclick="window.location.href='history.html'">🕐 瀏覽紀錄</button>
    <button onclick="window.location.href='my-events.html'">📋 我的活動</button>
  </div>

  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = 'login.html';

    async function loadHistory() {
      const res = await fetch('/api/users/history', {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const events = await res.json();
      const list = document.getElementById('historyList');

      if (events.length === 0) {
        list.innerHTML = '<p class="no-events">還沒有瀏覽紀錄</p>';
        return;
      }

      list.innerHTML = events.map(event => `
        <div class="event-card"
          onclick="window.location.href='event.html?id=${event.eventID}'">
          <div class="card-body">
            <h3>${event.title}</h3>
            <p>📅 ${new Date(event.eventTime).toLocaleDateString('zh-TW')}</p>
            <p>📍 ${event.location}</p>
            <p style="color:#aaa;font-size:12px">
              瀏覽時間：${new Date(event.viewedAt).toLocaleString('zh-TW')}
            </p>
          </div>
        </div>
      `).join('');
    }

    loadHistory();
  </script>
</body>
</html>
