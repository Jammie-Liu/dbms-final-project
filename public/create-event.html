<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新增活動</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .main-area {
      margin-right: 0 !important;
    }
  </style>
</head>
<body>
  <div class="main-area">
    <div class="top-bar">
      <h2 id="pageTitle">➕ Create Event</h2>
    </div>

    <div class="form-container">

      <div class="form-group">
        <label>Event Category <span style="color:var(--danger)">*</span></label>
        <select id="category">
          <option value="">Please select</option>
          <option value="career">🎓 Career & Academic Development</option>
          <option value="arts">🎨 Arts & Lifestyle Experience</option>
          <option value="social">🎉 Club & Social Entertainment</option>
          <option value="volunteer">🤝 Volunteer Service & Social Engagement</option>
        </select>
      </div>

      <div class="form-group">
        <label>Event Title <span style="color:var(--danger)">*</span></label>
        <input type="text" id="title" placeholder="Enter event title">
      </div>

      <div class="form-group">
        <label>Event Start Time <span style="color:var(--danger)">*</span></label>
        <input type="datetime-local" id="eventTime">
      </div>

      <div class="form-group">
        <label>Event End Time（選填）</label>
        <input type="datetime-local" id="eventEndTime">
      </div>

      <div class="form-group">
        <label>Event Location <span style="color:var(--danger)">*</span></label>
        <input type="text" id="location" placeholder="Enter location">
      </div>

      <div class="form-group">
        <label>Event Description <span style="color:var(--danger)">*</span></label>
        <textarea id="description" rows="5" placeholder="Enter event description"></textarea>
      </div>

      <hr>
      <p class="section-title">Optional Information</p>

      <div class="form-group">
        <label>Registration Deadline</label>
        <input type="datetime-local" id="registrationDeadline">
      </div>

      <div class="form-group">
        <label>Registration Link</label>
        <input type="url" id="registrationLink" placeholder="https://...">
      </div>

      <div class="form-group">
        <label>Hashtags</label>
        <p class="hint">例：職涯、講座（不需要加 #）</p>
        <input type="text" id="hashtagInput"
          placeholder="輸入 hashtag 後按 Enter 或空白鍵新增"
          style="margin-top:8px"
          onkeydown="addHashtag(event)">
        <div id="hashtagContainer" style="
          display:flex;flex-wrap:wrap;gap:8px;
          border:1.5px solid var(--border);border-radius:var(--radius-sm);
          padding:8px 12px;margin-top:7px;min-height:46px;cursor:text"
          onclick="document.getElementById('hashtagInput').focus()">
        </div>
      </div>

      <div class="form-group">
        <label>Fee（NT$）</label>
        <input type="number" id="fee" placeholder="0 means free" min="0">
      </div>

      <div class="form-group checkbox-group">
        <label><input type="checkbox" id="hasMeal"> Has Meal</label>
        <label><input type="checkbox" id="hasGift"> Has Gift</label>
      </div>

      <div class="form-group">
        <label>Event Image</label>
        <div id="imageUploadArea" style="
          border: 2px dashed var(--border);
          border-radius: var(--radius-md);
          padding: 24px;
          text-align: center;
          cursor: pointer;
          transition: all var(--transition)"
          onclick="document.getElementById('imageFile').click()"
          ondragover="event.preventDefault(); this.style.borderColor='var(--brand)'"
          ondragleave="this.style.borderColor='var(--border)'"
          ondrop="handleDrop(event)">
          <div id="uploadPlaceholder">
            <p style="font-size:32px;margin-bottom:8px">📷</p>
            <p style="font-size:14px;color:var(--text-secondary)">點擊或拖曳上傳圖片</p>
            <p style="font-size:12px;color:var(--text-tertiary);margin-top:4px">
              支援 JPG、PNG、WEBP，最大 5MB
            </p>
          </div>
          <img id="imagePreview" style="display:none;max-width:100%;
            border-radius:var(--radius-sm);max-height:200px">
        </div>
        <input type="file" id="imageFile" accept="image/*"
          style="display:none" onchange="previewImage(event)">
        <p id="uploadStatus" class="hint"></p>
      </div>

      <button id="submitBtn" onclick="submitEvent()" disabled style="
        background:var(--border);color:var(--text-tertiary);
        cursor:not-allowed;transition:all var(--transition)">
        Send
      </button>

      <p id="message" class="message"></p>
    </div>
  </div>

  <script src="sidebar.js"></script>
  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = 'login.html';

    const params = new URLSearchParams(window.location.search);
    const editID = params.get('edit');
    let uploadedImageURL = null;

    // 修改模式
    if (editID) {
      document.getElementById('pageTitle').textContent = '✏️ Edit Event';
      document.getElementById('submitBtn').textContent = 'Save Changes';
      loadEventData();
    }

    // 載入活動資料（修改模式）
    async function loadEventData() {
      try {
        // 先檢查有沒有未審核的草稿
        const draftRes = await fetch(`/api/events/${editID}/draft`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        let event;
        if (draftRes.ok) {
          event = await draftRes.json(); // 有草稿就用草稿
        } else {
          const res = await fetch(`/api/events/${editID}`);
          event = await res.json(); // 沒有就用原本的
        }

        document.getElementById('category').value = event.category;
        document.getElementById('title').value = event.title;
        document.getElementById('location').value = event.location;
        document.getElementById('description').value = event.description;
        document.getElementById('fee').value = event.fee || 0;
        document.getElementById('hasMeal').checked = event.hasMeal === 1;
        document.getElementById('hasGift').checked = event.hasGift === 1;
        document.getElementById('registrationLink').value = event.registrationLink || '';

        // 如果有舊圖片，顯示預覽
        if (event.imageURL) {
          uploadedImageURL = event.imageURL;
          document.getElementById('imagePreview').src = event.imageURL;
          document.getElementById('imagePreview').style.display = 'block';
          document.getElementById('uploadPlaceholder').style.display = 'none';
          document.getElementById('uploadStatus').textContent = '✅ 已有圖片';
        }

        // 時間轉換（UTC+8）
        function toLocalDatetimeString(dateStr) {
          if (!dateStr) return '';
          return new Date(dateStr).toLocaleString('sv-SE', {
            timeZone: 'Asia/Taipei'
          }).slice(0, 16).replace(' ', 'T');
        }

        if (event.eventTime) {
          document.getElementById('eventTime').value = toLocalDatetimeString(event.eventTime);
        }
        if (event.eventEndTime) {
          document.getElementById('eventEndTime').value = toLocalDatetimeString(event.eventEndTime);
        }
        if (event.registrationDeadline) {
          document.getElementById('registrationDeadline').value = toLocalDatetimeString(event.registrationDeadline);
        }

        // 載入 hashtags
        if (event.hashtags && event.hashtags.length > 0) {
          hashtags = [...event.hashtags];
          renderHashtags();
        }

        // 資料填完後重新檢查按鈕狀態
        checkFormValid();

        // 檢查審核次數上限
        const limitRes = await fetch(`/api/events/${editID}/check-limit`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const limitData = await limitRes.json();

        if (limitData.reauditLimited) {
          const btn = document.getElementById('submitBtn');
          btn.disabled = true;
          btn.style.background = 'var(--border)';
          btn.style.color = 'var(--text-tertiary)';
          btn.style.cursor = 'not-allowed';
          btn.textContent = '已達重審上限，無法再送出';

          // 顯示提示訊息
          const message = document.getElementById('message');
          message.textContent = '此活動已達退件重審上限（3次），無法再送出修改。';
          message.className = 'message error';
          message.style.display = 'block';
        }

      } catch (err) {
        console.error('載入活動資料失敗', err);
      }
    }


    // Hashtags 管理函數
    let hashtags = [];

    function addHashtag(e) {
      if (e.isComposing || e.keyCode === 229) {
        return;
      }

      if (e.key === 'Enter') {
        e.preventDefault();
        const input = document.getElementById('hashtagInput');
        const tag = input.value.trim().replace('#', '');
        if (tag && !hashtags.includes(tag)) {
          hashtags.push(tag);
          renderHashtags();
        }
        input.value = '';
      }
    }

    function removeHashtag(tag) {
      hashtags = hashtags.filter(t => t !== tag);
      renderHashtags();
    }

    function renderHashtags() {
      const container = document.getElementById('hashtagContainer');
      container.innerHTML = hashtags.map(tag => `
        <span style="
          display:inline-flex;align-items:center;gap:6px;
          background:var(--brand-light);color:var(--brand);
          padding:4px 10px;border-radius:20px;font-size:13px;font-weight:500">
          #${tag}
          <span onclick="removeHashtag('${tag}')"
            style="cursor:pointer;font-size:16px;line-height:1">×</span>
        </span>
      `).join('');
    }

    // 圖片預覽
    function previewImage(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (e) => {
        document.getElementById('imagePreview').src = e.target.result;
        document.getElementById('imagePreview').style.display = 'block';
        document.getElementById('uploadPlaceholder').style.display = 'none';
      };
      reader.readAsDataURL(file);

      uploadImage(file);
    }

    // 拖曳上傳
    function handleDrop(event) {
      event.preventDefault();
      document.getElementById('imageUploadArea').style.borderColor = 'var(--border)';
      const file = event.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) {
        previewImage({ target: { files: [file] } });
      }
    }

    // 上傳到 Cloudinary
    async function uploadImage(file) {
      const status = document.getElementById('uploadStatus');
      status.textContent = '上傳中...';
      status.style.color = 'var(--text-secondary)';

      const formData = new FormData();
      formData.append('image', file);

      try {
        const res = await fetch('/api/events/upload-image', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}` },
          body: formData
        });

        const data = await res.json();

        if (res.ok) {
          uploadedImageURL = data.imageURL;
          status.textContent = '✅ 上傳成功';
          status.style.color = 'var(--success)';
        } else {
          status.textContent = '❌ 上傳失敗：' + data.message;
          status.style.color = 'var(--danger)';
        }
      } catch (err) {
        status.textContent = '❌ 上傳失敗，請重試';
        status.style.color = 'var(--danger)';
        console.error(err);
      }
    }

    // 送出表單
    async function submitEvent() {
      const message = document.getElementById('message');

      const category = document.getElementById('category').value;
      const title = document.getElementById('title').value;
      const eventTime = document.getElementById('eventTime').value;
      const location = document.getElementById('location').value;
      const description = document.getElementById('description').value;

      if (!category || !title || !eventTime || !location || !description) {
        message.textContent = '請填寫所有必填欄位';
        message.className = 'message error';
        return;
      }

      const eventEndTime = document.getElementById('eventEndTime').value;
      if (eventEndTime && new Date(eventEndTime) <= new Date(eventTime)) {
        message.textContent = '活動結束時間必須晚於活動開始時間！';
        message.className = 'message error';
        return;
      }

      const body = {
        category,
        title,
        eventTime,
        eventEndTime: eventEndTime || null,
        location,
        description,
        registrationDeadline: document.getElementById('registrationDeadline').value || null,
        registrationLink: document.getElementById('registrationLink').value || null,
        hashtags: hashtags,  // 陣列
        fee: parseInt(document.getElementById('fee').value) || 0,
        hasMeal: document.getElementById('hasMeal').checked,
        hasGift: document.getElementById('hasGift').checked,
        imageURL: uploadedImageURL || null,
      };

      try {
        const url = editID ? `/api/events/${editID}` : '/api/events';
        const method = editID ? 'PUT' : 'POST';

        const res = await fetch(url, {
          method,
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify(body)
        });

        const data = await res.json();

        if (res.ok) {
          message.textContent = editID ? '活動已更新！' : '活動已送出，等待審核！';
          message.className = 'message success';
          setTimeout(() => window.location.href = 'my-events.html', 1500);
        } else {
          message.textContent = data.message;
          message.className = 'message error';
        }
      } catch (err) {
        message.textContent = '伺服器錯誤';
        message.className = 'message error';
      }
    }

    // 監聽必填欄位變化
    function checkFormValid() {
      const category = document.getElementById('category').value;
      const title = document.getElementById('title').value.trim();
      const eventTime = document.getElementById('eventTime').value;
      const location = document.getElementById('location').value.trim();
      const description = document.getElementById('description').value.trim();

      const btn = document.getElementById('submitBtn');
      const isValid = category && title && eventTime && location && description;

      if (isValid) {
        btn.disabled = false;
        btn.style.background = 'var(--brand)';
        btn.style.color = 'white';
        btn.style.cursor = 'pointer';
      } else {
        btn.disabled = true;
        btn.style.background = 'var(--border)';
        btn.style.color = 'var(--text-tertiary)';
        btn.style.cursor = 'not-allowed';
      }
    }

    // 綁定所有必填欄位的 input 事件
    document.getElementById('category').addEventListener('change', checkFormValid);
    document.getElementById('title').addEventListener('input', checkFormValid);
    document.getElementById('eventTime').addEventListener('change', checkFormValid);
    document.getElementById('location').addEventListener('input', checkFormValid);
    document.getElementById('description').addEventListener('input', checkFormValid);

    // 初始檢查（修改模式下資料填好後要啟用按鈕）
    checkFormValid();
  </script>
</body>
</html>
