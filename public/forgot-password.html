<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>忘記密碼</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      display: flex !important;
      justify-content: center !important;
      align-items: center !important;
      min-height: 100vh !important;
      background: var(--bg) !important;
    }
  </style>

</head>

<body>
  <div class="auth-wrapper">
    <div class="auth-container">
      <h1>Forget Password</h1>
      <p style="color:#666;margin-bottom:20px">Enter your Email, we will send a reset link</p>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="Enter Your Email">
      </div>

      <button onclick="sendReset()">Send Reset Link</button>
      <p class="switch-page" style="margin-top: 20px;"><a href="login.html">← Back to Login</a></p>
      <p id="message" class="message"></p>
    </div>
  </div>
  <script>
    async function sendReset() {
      const email = document.getElementById('email').value;
      const message = document.getElementById('message');

      const res = await fetch('/api/users/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });

      const data = await res.json();
      if (data.message === '請輸入正確的 Email！') {
        message.textContent = data.message;
        message.style.color = 'red';
      } else {
        message.textContent = data.message;
        message.style.color = 'green';
      }
    }
  </script>
</body>

</html>
