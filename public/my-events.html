<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的活動</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .main-area {
      margin-right: 0 !important;
    }
    .event-grid {
      grid-template-columns: repeat(3, 1fr) !important;
    }
  </style>
</head>
<body>
  <div class="main-area">
  <div class="top-bar">
    <h2>📋 My Events</h2>
  </div>
  <div id="myEventList" class="event-grid"></div>
</div>

  <script src="sidebar.js"></script>

  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = 'login.html';

    async function loadMyEvents() {
      const res = await fetch('/api/users/my-events', {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const events = await res.json();
      const list = document.getElementById('myEventList');

      if (events.length === 0) {
        list.innerHTML = '<p class="no-events">還沒有發布過活動</p>';
        return;
      }

      list.innerHTML = events.map(event => `
        <div class="event-card">
          <div class="card-top">
            <span class="status-tag ${getAuditClass(event.auditStatus)}">
              ${getAuditText(event.auditStatus)}
            </span>
            <div class="card-actions">
              <span onclick="editEvent(${event.eventID})" title="修改">✏️</span>
              <span onclick="cancelEvent(${event.eventID})" title="取消">❌</span>
            </div>
          </div>
          <div class="card-body">
            <h3>${event.title}</h3>
            <p>📅 ${new Date(event.eventTime).toLocaleDateString('zh-TW')}${event.eventEndTime
              ? ` - ${new Date(event.eventEndTime).toLocaleDateString('zh-TW')}`
              : ''
            }</p>
            <p>📍 ${event.location}</p>
            <p>狀態：${getStatusText(event.status)}</p>
            ${event.auditStatus === 'rejected' && event.rejectReason ? `
              <div style="margin-top:8px;padding:10px 12px;background:#fef2f2;
                border-radius:var(--radius-sm);border:1px solid #fecaca">
                <p style="font-size:12px;font-weight:600;color:var(--danger);margin-bottom:4px">
                  退件原因
                </p>
                <p style="font-size:13px;color:var(--text-secondary)">${event.rejectReason}</p>
              </div>
            ` : ''}
            ${event.reaudit_count > 0 ? `
            <p style="font-size:12px;color:var(--text-tertiary);margin-top:5px">
              已審核 ${event.reaudit_count} 次
              ${event.reaudit_count >= 3
                ? '（已達重審上限）'
                : `（剩餘 ${3 - event.reaudit_count} 次重審機會）`
              }
            </p>
          ` : ''}
            ${event.edit_count > 0 ? `
            <p style="font-size:12px;color:var(--text-tertiary);margin-top:5px">
              已編輯 ${event.edit_count} 次
              ${event.edit_count >= 3
                ? '（已達編輯審核上限）'
                : `（剩餘 ${3 - event.edit_count} 次編輯機會）`
              }
            </p>
          ` : ''}
          </div>
        </div>
      `).join('');
    }

    function getAuditClass(status) {
      if (status === 'approved') return 'open';
      if (status === 'rejected') return 'cancelled';
      return 'soon';
    }

    function getAuditText(status) {
      if (status === 'approved') return '審核通過';
      if (status === 'rejected') return '審核未通過';
      if (status === 'draft_pending') return '修改版本審核中';
      return '尚未審核';
    }

    function getStatusText(status) {
      const map = {
        pending: '待審核', approved: '已通過',
        rejected: '未通過', cancelled: '已取消'
      };
      return map[status] || status;
    }

    function editEvent(eventID) {
      window.location.href = `create-event.html?edit=${eventID}`;
    }

    async function cancelEvent(eventID) {
      if (!confirm('確定要取消此活動嗎？')) return;

      const res = await fetch(`/api/events/${eventID}/cancel`, {
        method: 'PATCH',
        headers: { 'Authorization': `Bearer ${token}` }
      });

      if (res.ok) {
        alert('活動已取消');
        loadMyEvents();
      }
    }

    loadMyEvents();
  </script>
</body>
</html>
