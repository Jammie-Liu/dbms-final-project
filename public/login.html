<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <link rel="stylesheet" href="auth.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-container">
      <div class="auth-logo">🎯</div>
      <h1>歡迎回來</h1>
      <p class="auth-subtitle">登入你的帳號</p>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="name@example.com">
      </div>

      <div class="form-group">
        <label>密碼</label>
        <input type="password" id="password" placeholder="輸入密碼">
      </div>

      <button onclick="login()" style="margin-top:8px">登入</button>

      <div class="auth-footer" style="margin-top:14px">
        <a href="forgot-password.html">忘記密碼？</a>
      </div>
      <div class="auth-footer">
        還沒有帳號？<a href="register.html"> 註冊</a>
      </div>

      <p id="message" class="message"></p>
    </div>
  </div>
  <script>
    async function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const message = document.getElementById('message');

      try {
        const res = await fetch('/api/users/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (res.ok) {
          // token 存進 localStorage，之後每個頁面都會用到
          localStorage.setItem('token', data.token);
          localStorage.setItem('userID', data.userID);
          localStorage.setItem('username', data.username);
          localStorage.setItem('role', data.role);

          // 根據是否設定過偏好決定跳去哪
          if (!data.hasPreferences) {
            window.location.href = 'preferences.html';
          } else {
            window.location.href = 'index.html';
          }
        } else {
          message.textContent = data.message;
          message.style.color = 'red';
        }
      } catch (err) {
        message.textContent = '伺服器錯誤，請稍後再試';
        message.style.color = 'red';
      }
    }
  </script>
</body>
</html>
