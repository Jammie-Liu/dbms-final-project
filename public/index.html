<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>學生活動資訊平台</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <div class="header">
    <span class="header-brand">🎯 學生活動資訊平台</span>
    <div class="header-right">
      <input class="header-search" type="text" id="searchInput" placeholder="搜尋活動...">
      <button class="header-btn" onclick="searchEvents()">🔍</button>
      <button class="header-btn add" onclick="window.location.href='create-event.html'">＋</button>
      <span class="welcome-chip" id="welcomeText"></span>
      <button class="logout-btn" onclick="logout()">登出</button>
    </div>
  </div>

  <!-- 分類篩選 -->
  <div class="filter-bar">
    <button class="category-btn filter-btn active" onclick="setCategory('', this)">全部</button>
    <button class="category-btn filter-btn" onclick="setCategory('career', this)">🎓 職涯</button>
    <button class="category-btn filter-btn" onclick="setCategory('arts', this)">🎨 藝文</button>
    <button class="category-btn filter-btn" onclick="setCategory('social', this)">🎉 社交</button>
    <button class="category-btn filter-btn" onclick="setCategory('volunteer', this)">🤝 志工</button>
  </div>

  <!-- ✅ 這個一定要有！ -->
  <div class="main-content">
    <div id="eventList" class="event-grid"></div>
  </div>

  <!-- 下方 Bar -->
  <div class="bottom-bar">
    <button onclick="window.location.href='index.html'">
      <span class="bar-icon">🏠</span>首頁
    </button>
    <button onclick="window.location.href='favorites.html'">
      <span class="bar-icon">❤️</span>收藏
    </button>
    <button onclick="window.location.href='history.html'">
      <span class="bar-icon">🕐</span>紀錄
    </button>
    <button onclick="window.location.href='my-events.html'">
      <span class="bar-icon">📋</span>我的活動
    </button>
  </div>

  <script src="script.js"></script>
</body>
</html>
