<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重設密碼</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
            min-height: 100vh !important;
            background: var(--bg) !important;
        }

        .auth-wrapper {
            width: 100% !important;
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
            padding: 24px !important;
        }

        .auth-container {
            max-width: 420px !important;
            width: 100% !important;
            padding: 48px 40px !important;
        }
    </style>

</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-container">
            <div class="auth-logo">🔐</div>
            <h1>重設密碼</h1>
            <p class="auth-subtitle">請輸入你的新密碼</p>

            <div class="form-group">
                <label>新密碼</label>
                <input type="password" id="newPassword" autocomplete="new-password" placeholder="8~12 字元，含數字和英文">
            </div>

            <div class="form-group">
                <label>確認新密碼</label>
                <input type="password" id="confirmPassword" autocomplete="new-password" placeholder="再輸入一次新密碼">
            </div>

            <button onclick="resetPassword()" style="margin-top:8px">確認重設</button>

            <p id="message" class="message"></p>
        </div>
    </div>

    <script>
        // 從 URL 拿 token
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        if (!token) {
            document.getElementById('message').textContent = '無效的連結！';
            document.getElementById('message').className = 'message error';
        }

        async function resetPassword() {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const message = document.getElementById('message');

            if (!newPassword || !confirmPassword) {
                message.textContent = '請填寫所有欄位';
                message.className = 'message error';
                return;
            }

            if (newPassword !== confirmPassword) {
                message.textContent = '兩次密碼不一致';
                message.className = 'message error';
                return;
            }

            try {
                const res = await fetch('/api/users/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword })
                });

                const data = await res.json();

                if (res.ok) {
                    message.textContent = '密碼重設成功！3 秒後跳回登入頁...';
                    message.className = 'message success';
                    setTimeout(() => window.location.href = 'login.html', 3000);
                } else {
                    message.textContent = data.message;
                    message.className = 'message error';
                }
            } catch (err) {
                message.textContent = '伺服器錯誤，請稍後再試';
                message.className = 'message error';
            }
        }
    </script>
</body>

</html>
