<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>註冊</title>
  <link rel="stylesheet" href="auth.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-container">
      <div class="auth-logo">✨</div>
      <h1>建立帳號</h1>
      <p class="auth-subtitle">加入我們，探索精彩活動</p>

      <div class="form-group">
        <label>使用者名稱</label>
        <input type="text" id="username" placeholder="輸入你的名稱">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="name@example.com">
      </div>
      <div class="form-group">
        <label>密碼</label>
        <input type="password" id="password" placeholder="8~12 字元，含數字和英文">
      </div>

      <button onclick="register()" style="margin-top:8px">建立帳號</button>

      <div class="auth-footer">
        已有帳號？<a href="login.html"> 登入</a>
      </div>

      <p id="message" class="message"></p>
    </div>
  </div>
  <script>
    async function register() {
      const username = document.getElementById('username').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const message = document.getElementById('message');

      if (!username || !email || !password) {
        message.textContent = '請填寫所有欄位';
        message.style.color = 'red';
        return;
      }

      try {
        const res = await fetch('/api/users/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password })
        });

        const data = await res.json();

        if (res.ok) {
          message.textContent = '註冊成功！跳轉到登入頁面...';
          message.style.color = 'green';
          setTimeout(() => window.location.href = 'login.html', 1500);
        } else {
          message.textContent = data.message;
          message.style.color = 'red';
        }
      } catch (err) {
        message.textContent = '伺服器錯誤，請稍後再試';
        message.style.color = 'red';
      }
    }
  </script>
</body>
</html>
