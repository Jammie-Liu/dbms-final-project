<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>註冊</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="styles/auth.css">
</head>

<body>
  <div class="auth-wrapper">
    <div class="auth-container">
      <h1>Register</h1>
      <p class="auth-subtitle">Join us and explore exciting events</p>

      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="請輸入您的姓名">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="name@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="需為 8~12 位數字英文混合" onkeypress="if(event.key==='Enter') register()">
      </div>

      <button onclick="register()" style="margin-top:8px">Create Account</button>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Sign In</a>
      </div>

      <p id="message" class="message"></p>
    </div>
  </div>

  <script src="js/register.js"></script>
</body>
</html>
